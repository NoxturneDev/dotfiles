# Color scheme
include catpuccin_theme.conf
# Font settings
font_family JetBrainsMono Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto

# Background and transparency
background_opacity 0.3

# Window settings
confirm_os_window_close 0

# Cursor settings
cursor_shape beam
#cursor_trail 1

# Shell and other settings
shell /usr/bin/zsh
enable_graphics yes
window_padding_width 5 10


