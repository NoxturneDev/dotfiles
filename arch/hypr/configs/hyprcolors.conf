# ────────────────────────────────
# 🐈 Catppuccin Mocha (Hyprland)
# Palette: https://github.com/catppuccin/catppuccin
# ────────────────────────────────

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1

    # Borders
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(6c7086cc) # Surface2

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(585b70ff)   # Overlay0
    }

    blur {
        enabled = true
        size = 4         # <--- INCREASE THIS for more blur (higher = more frosted)
        passes = 2        # <--- INCREASE THIS for smoother blur (usually 3-4 is sweet spot)
        
        vibrancy = 0.1696
        noise = 0.01     
        contrast = 0.9   
        brightness = 0.8
    }
}

