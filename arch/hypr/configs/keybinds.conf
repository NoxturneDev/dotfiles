$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$clipboard = cliphist list

$mainMod = SUPER

# --- Apps ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, O, exec, $fileManager
bind = $mainMod SHIFT, P, exec, $menu
bind = $mainMod, V, exec, $clipboard | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, L, exec, loginctl lock-session
bind = $mainMod, B, exec, /opt/zen-browser-bin/zen-bin

# --- Window Manager Control ---
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, K, movecurrentworkspacetomonitor, u
bind = $mainMod SHIFT, J, movecurrentworkspacetomonitor, d
bind = $mainMod SHIFT, H, movecurrentworkspacetomonitor, l
bind = $mainMod SHIFT, L, movecurrentworkspacetomonitor, r
bind = $mainMod, TAB, workspace, previous

# --- Focus movement ---
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, resizeactive, -10 0
bind = $mainMod SHIFT, l, resizeactive, 10 0
bind = $mainMod SHIFT, j, resizeactive, 0 10
bind = $mainMod SHIFT, k, resizeactive, 0 -10

# --- Workspaces (QWE-ASD-ZXC layout) ---
# Row 1
bind = $mainMod, Q, workspace, 1
bind = $mainMod, W, workspace, 2
bind = $mainMod, E, workspace, 3

# Row 2
bind = $mainMod, A, workspace, 4
bind = $mainMod, S, workspace, 5
bind = $mainMod, D, workspace, 6

# Row 3
bind = $mainMod, Z, workspace, 7
bind = $mainMod, X, workspace, 8
bind = $mainMod, C, workspace, 9

# Move focused window to a workspace (with Shift)
bind = $mainMod SHIFT, A, movetoworkspace, 4
bind = $mainMod SHIFT, D, movetoworkspace, 6
bind = $mainMod SHIFT, Z, movetoworkspace, 7
bind = $mainMod SHIFT, X, movetoworkspace, 8
bind = $mainMod SHIFT, C, movetoworkspace, 9

# --- Numeric workspaces (mirror QWE-ASD-ZXC layout) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Special workspace (scratchpad) ---
bind = $mainMod, SPACE, togglespecialworkspace, magic
bind = $mainMod SHIFT, SPACE, movetoworkspace, special:magic

# --- Scroll through workspaces ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- Move/resize with mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Media keys ---
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-

# --- Screenshots ---
bind = $mainMod SHIFT, S, exec, hyprshot -m region
bind = , PRINT, exec, hyprshot -m output
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region

input {
    touchpad {
        natural_scroll = true
    }
    kb_layout = us
    kb_variant =
    kb_options =
}

